<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#565f89"/>
      <stop offset="35%" stop-color="#7aa2f7"/>
      <stop offset="65%" stop-color="#bb9af7"/>
      <stop offset="85%" stop-color="#7dcfff"/>
      <stop offset="100%" stop-color="#414868"/>
    </linearGradient>
    <radialGradient id="pulseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7dcfff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7dcfff" stop-opacity="0"/>
    </radialGradient>
    <style>
      .yr  { font-family: 'SFMono-Regular', Consolas, monospace; font-size: 14px; fill: #565f89; }
      .lbl { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 16px; font-weight: 600; fill: #c0caf5; }
      .sub { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 12.5px; fill: #7dcfff; }
    </style>
  </defs>

  <rect width="1200" height="260" fill="none"/>

  <!-- main line -->
  <line x1="90" y1="130" x2="1000" y2="130" stroke="url(#lineGrad)" stroke-width="2.5"/>
  <!-- dashed segment to "Next" -->
  <line x1="1000" y1="130" x2="1110" y2="130" stroke="#414868" stroke-width="2.5" stroke-dasharray="6 6"/>

  <!-- Node 1: 2023 -->
  <g transform="translate(90,130)">
    <circle r="7" fill="#1a1b27" stroke="#7aa2f7" stroke-width="2.5"/>
    <text class="yr" text-anchor="middle" y="-46">2023</text>
    <text class="lbl" text-anchor="middle" y="-24">Started Java</text>
    <text class="sub" text-anchor="middle" y="34">Foundations · OOP · DSA</text>
  </g>

  <!-- Node 2: 2024 -->
  <g transform="translate(320,130)">
    <circle r="7" fill="#1a1b27" stroke="#bb9af7" stroke-width="2.5"/>
    <text class="yr" text-anchor="middle" y="34">2024</text>
    <text class="lbl" text-anchor="middle" y="56">Learned MERN Stack</text>
    <text class="sub" text-anchor="middle" y="-24">React · Node · MongoDB</text>
  </g>

  <!-- Node 3: 2025 -->
  <g transform="translate(560,130)">
    <circle r="7" fill="#1a1b27" stroke="#7dcfff" stroke-width="2.5"/>
    <text class="yr" text-anchor="middle" y="-46">2025</text>
    <text class="lbl" text-anchor="middle" y="-24">Built AI Interview Platform</text>
    <text class="sub" text-anchor="middle" y="34">Gemini API · Speech AI</text>
  </g>

  <!-- Node 4: 2026 (current, pulsing) -->
  <g transform="translate(1000,130)">
    <circle r="16" fill="url(#pulseGrad)">
      <animate attributeName="r" values="12;22;12" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0.15;0.8" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle r="8" fill="#16161e" stroke="#7dcfff" stroke-width="3"/>
    <text class="yr" text-anchor="middle" y="34" fill="#7dcfff">2026 · NOW</text>
    <text class="lbl" text-anchor="middle" y="56">Open Source Contributor</text>
  </g>

  <!-- Node 5: Next -->
  <g transform="translate(1110,130)">
    <circle r="7" fill="none" stroke="#565f89" stroke-width="2" stroke-dasharray="3 3"/>
    <text class="yr" text-anchor="middle" y="-46">Next</text>
    <text class="lbl" text-anchor="middle" y="-24" fill="#9aa5ce">Backend Engineer</text>
  </g>
</svg>
