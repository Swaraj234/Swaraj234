<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14141c"/>
      <stop offset="50%" stop-color="#1a1b27"/>
      <stop offset="100%" stop-color="#1f2033"/>
    </linearGradient>

    <linearGradient id="sweep" x1="-40%" y1="0%" x2="140%" y2="0%">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0"/>
      <stop offset="45%" stop-color="#7aa2f7" stop-opacity="0.12"/>
      <stop offset="55%" stop-color="#bb9af7" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#bb9af7" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-300 0; 1200 0; -300 0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#bb9af7" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#bb9af7" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e4e8fb"/>
      <stop offset="55%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>

    <linearGradient id="rackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#242539"/>
      <stop offset="100%" stop-color="#1b1c2b"/>
    </linearGradient>

    <radialGradient id="nodePulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7dcfff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7dcfff" stop-opacity="0"/>
    </radialGradient>

    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>

    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#565f89"/>
    </pattern>
  </defs>

  <!-- base -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  <rect width="1200" height="320" fill="url(#sweep)"/>
  <rect width="1200" height="320" fill="url(#dots)" opacity="0.16"/>

  <!-- ambient glows -->
  <circle cx="230" cy="60" r="160" fill="url(#glow1)"/>
  <circle cx="980" cy="260" r="200" fill="url(#glow2)"/>

  <!-- floating particles -->
  <g fill="#7dcfff">
    <circle cx="120" cy="260" r="1.6" opacity="0.7">
      <animate attributeName="cy" values="260;40;260" dur="11s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="11s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="290" r="1.3" opacity="0.6" fill="#bb9af7">
      <animate attributeName="cy" values="290;30;290" dur="14s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="14s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="640" cy="270" r="1.8" opacity="0.5" fill="#9ece6a">
      <animate attributeName="cy" values="270;20;270" dur="9s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="9s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="750" cy="300" r="1.4" opacity="0.6">
      <animate attributeName="cy" values="300;50;300" dur="12.5s" begin="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.8;0" dur="12.5s" begin="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1120" cy="280" r="1.5" opacity="0.5" fill="#bb9af7">
      <animate attributeName="cy" values="280;60;280" dur="10s" begin="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.7;0" dur="10s" begin="3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- server rack illustration, right side -->
  <g transform="translate(905,60)">
    <!-- rack frame -->
    <rect x="0" y="0" width="150" height="190" rx="10" fill="url(#rackGrad)" stroke="#33344d" stroke-width="1.5"/>

    <!-- server units -->
    <g>
      <rect x="14" y="16" width="122" height="30" rx="5" fill="#1a1b27" stroke="#33344d"/>
      <circle cx="30" cy="31" r="3" fill="#9ece6a">
        <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <rect x="44" y="27" width="60" height="3" rx="1.5" fill="#414868"/>
      <rect x="44" y="35" width="40" height="3" rx="1.5" fill="#414868"/>
    </g>
    <g>
      <rect x="14" y="54" width="122" height="30" rx="5" fill="#1a1b27" stroke="#33344d"/>
      <circle cx="30" cy="69" r="3" fill="#7aa2f7">
        <animate attributeName="opacity" values="1;0.25;1" dur="2s" begin="0.4s" repeatCount="indefinite"/>
      </circle>
      <rect x="44" y="65" width="60" height="3" rx="1.5" fill="#414868"/>
      <rect x="44" y="73" width="45" height="3" rx="1.5" fill="#414868"/>
    </g>
    <g>
      <rect x="14" y="92" width="122" height="30" rx="5" fill="#1a1b27" stroke="#33344d"/>
      <circle cx="30" cy="107" r="3" fill="#bb9af7">
        <animate attributeName="opacity" values="1;0.25;1" dur="1.8s" begin="0.8s" repeatCount="indefinite"/>
      </circle>
      <rect x="44" y="103" width="60" height="3" rx="1.5" fill="#414868"/>
      <rect x="44" y="111" width="50" height="3" rx="1.5" fill="#414868"/>
    </g>
    <g>
      <rect x="14" y="130" width="122" height="30" rx="5" fill="#1a1b27" stroke="#33344d"/>
      <circle cx="30" cy="145" r="3" fill="#7dcfff">
        <animate attributeName="opacity" values="1;0.25;1" dur="2.2s" begin="1.2s" repeatCount="indefinite"/>
      </circle>
      <rect x="44" y="141" width="60" height="3" rx="1.5" fill="#414868"/>
      <rect x="44" y="149" width="38" height="3" rx="1.5" fill="#414868"/>
    </g>

    <rect x="0" y="0" width="150" height="190" rx="10" fill="none" stroke="url(#nameGrad)" stroke-opacity="0.15"/>
  </g>

  <!-- client nodes connecting to rack -->
  <g stroke="#414868" stroke-width="1.3">
    <line x1="770" y1="70" x2="905" y2="90"/>
    <line x1="770" y1="150" x2="905" y2="130"/>
    <line x1="770" y1="220" x2="905" y2="180"/>
  </g>
  <g>
    <circle cx="770" cy="70" r="5" fill="#7aa2f7"/>
    <circle cx="770" cy="70" r="13" fill="url(#nodePulse)">
      <animate attributeName="r" values="9;16;9" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.1;0.7" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="770" cy="150" r="4.5" fill="#bb9af7"/>
    <circle cx="770" cy="220" r="4.5" fill="#9ece6a"/>
  </g>

  <!-- traveling API packets -->
  <circle r="3.2" fill="#c0caf5" filter="url(#soft)">
    <animateMotion dur="3.2s" repeatCount="indefinite" path="M770,70 L905,90"/>
  </circle>
  <circle r="3.2" fill="#c0caf5" filter="url(#soft)">
    <animateMotion dur="3.6s" begin="0.6s" repeatCount="indefinite" path="M905,130 L770,150"/>
  </circle>
  <circle r="3.2" fill="#c0caf5" filter="url(#soft)">
    <animateMotion dur="4s" begin="1.3s" repeatCount="indefinite" path="M770,220 L905,180"/>
  </circle>

  <!-- left accent bracket -->
  <text x="70" y="118" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace"
        font-size="20" fill="#565f89">&lt;</text>

  <!-- name -->
  <text x="70" y="153" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="54" font-weight="700" fill="url(#nameGrad)" letter-spacing="0.5">
    Swaraj Deshmukh
  </text>
  <text x="565" y="153" font-family="'SFMono-Regular', Consolas, monospace"
        font-size="20" fill="#565f89"> /&gt;</text>

  <!-- role line -->
  <text x="72" y="193" font-family="'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace"
        font-size="18" fill="#7dcfff" letter-spacing="0.5">
    backend.engineer<tspan fill="#565f89">()</tspan> <tspan fill="#565f89">·</tspan> scalable APIs <tspan fill="#565f89">·</tspan> system design
  </text>

  <!-- status pill -->
  <g transform="translate(72,218)">
    <rect width="320" height="34" rx="17" fill="#1f2335" stroke="#2a2e42"/>
    <circle cx="20" cy="17" r="5" fill="#9ece6a">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="36" y="22" font-family="'Segoe UI', system-ui, sans-serif" font-size="13.5" fill="#c0caf5">
      Open to Backend / Full-Stack roles
    </text>
  </g>

  <!-- fine bottom rule -->
  <line x1="70" y1="284" x2="1130" y2="284" stroke="#2a2e42" stroke-width="1"/>
  <text x="1130" y="276" text-anchor="end" font-family="'SFMono-Regular', Consolas, monospace"
        font-size="12" fill="#414868">india · gmt+5:30</text>
  <text x="70" y="303" font-family="'SFMono-Regular', Consolas, monospace"
        font-size="12" fill="#414868">github.com/Swaraj234</text>
</svg>
